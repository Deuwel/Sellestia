<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellestia - Roguelike RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌌 SELLESTIA</div>
        <div class="nav-menu">
            <span class="nav-btn">마을</span>
            <span class="nav-btn">던전</span>
            <span class="nav-btn">설정</span>
        </div>
        <div class="gold-display">💰 <span id="gold-amount">0</span></div>
    </nav>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3>Character</h3>
            <div class="character-info-card">
                <div class="info-header" style="margin-bottom: 10px;">
                    <strong style="font-size: 1.1rem;">Lv.<span id="p-side-level">1</span> Adventurer</strong>
                </div>
                <div class="bar-bg exp" style="height: 14px; margin-bottom: 12px;">
                <div id="p-exp-bar" class="fill"></div>
                <span id="p-exp-percent" style="line-height: 14px; font-size: 10px;">0%</span>
                </div>
                <div id="p-exp-text" class="exp-detail">EXP: 0 / 0</div>
                <div id="p-stats-list">
                    </div>
            </div>
            
            <div class="character-info-card" style="margin-top: 10px;">
                <div class="stat-row">🧪 포션 보유량: <strong id="p-potion-count">5</strong></div>
            </div>
        </aside>
        
        
        <main class="battle-field">
            <div class="dungeon-info">
                <h2 class="dungeon-name" id="dungeon-title">평원</h2>
                <div class="wave-count">WAVE <span id="current-wave">1</span> / 10</div>
            </div>

            <div class="battle-main-zone">
                <div class="arena">
                    <div class="character-card" id="player-card">
                        <div class="image-box">👤</div>
                        <div class="info" style="margin-bottom: 10px;">
                            <span style="color: #a29bfe; font-weight: bold;">Lv.<span id="p-level">1</span></span>
                            <strong id="p-name">Adventurer</strong>
                        </div>
                        <div class="bar-bg hp">
                            <div id="p-hp-bar" class="fill"></div>
                            <span id="p-hp-text">0 / 0</span>
                        </div>
                        <div class="bar-bg sp-bar" style="height: 8px;">
                            <div id="p-sp-bar" class="fill"></div>
                        </div>
                    </div>

                    <div class="vs">VS</div>

                    <div class="character-card" id="monster-card">
                        <div class="image-box" id="m-icon">❓</div>
                        <div class="info" style="margin-bottom: 10px;">
                            <span style="color: #ff7675; font-weight: bold;">Lv.<span id="m-level">1</span></span>
                            <strong id="m-name">-</strong>
                        </div>
                        <div class="bar-bg hp">
                            <div id="m-hp-bar" class="fill"></div>
                            <span id="m-hp-text">0 / 0</span>
                        </div>
                        <div class="bar-bg sp-bar" style="height: 8px;">
                            <div id="m-sp-bar" class="fill"></div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button id="btn-potion" class="action-btn">
                        <div class="btn-icon">🧪</div> 
                        <div class="btn-label">포션</div>
                        <div class="btn-count-text">잔여 : <span id="potion-qty" class="btn-count-num">2</span></div>
                    </button>

                    <button class="action-btn locked" disabled>
                        <div class="btn-icon">🔒</div>
                        <div class="btn-label">잠김</div>
                        <div class="btn-count-text">Lv.5 해금</div>
                    </button>
                </div>
            </div>

            <section class="log-container">
                <div class="log-header">BATTLE LOG</div>
                <div id="battle-log" class="log-content"></div>
            </section>
        </main>
    </div>

    <script type="module" src="main.js"></script>
    <script type="module">
        import { Player } from './src/Player.js';
        import { Battle } from './src/Battle.js';
        import { UI } from './src/UI.js';
        import { DUNGEON_POOL } from './src/Monster.js';

        // 1. 인스턴스 초기 생성
        const ui = new UI();
        let player = new Player();

        /**
         * localStorage에서 데이터를 로드하여 Player 객체에 주입
         */
        function loadPlayerData() {
            const savedData = localStorage.getItem('playerData');
            
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    
                    // 1. 단순 값 복사 (level, exp, statPoints, potionCount 등)
                    Object.assign(player, parsed);
                    
                    // 2. baseStats 객체 복사 (마을에서 투입한 포인트 정보)
                    if (parsed.baseStats) {
                        player.baseStats = { ...parsed.baseStats };
                    }
                    
                    // 3. [중요] 스탯 기반으로 전투 능력치(atk, hp, crit 등) 재계산
                    // player.js 내에 해당 메서드가 정의되어 있어야 합니다.
                    if (typeof player.updateDerivedStats === 'function') {
                        player.updateDerivedStats();
                    }
                    
                    // 4. 전투용 실시간 HP를 계산된 최대 HP로 초기화
                    player.hp = player.maxHp;
                    
                    console.log("✅ [데이터 로드] 마을 스탯 반영 완료:", player);
                } catch (e) {
                    console.error("❌ [데이터 로드] 오류 발생:", e);
                }
            } else {
                console.log("ℹ️ 저장된 데이터가 없습니다. 기본 캐릭터로 시작합니다.");
            }
        }

        // 로드 실행
        loadPlayerData();

        // 2. 배틀 객체 생성 및 던전 시작
        // 생성자 인자 순서: (플레이어 객체, 몬스터 배열, UI 객체)
        const battle = new Battle(player, DUNGEON_POOL, ui);

        // 3. 던전 시작 (첫 번째 적 소환 및 인터벌 실행)
        battle.startDungeon();
    </script>
</body>
</html>
