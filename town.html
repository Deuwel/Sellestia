<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellestia - Town</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nabla&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* 마을 전용 스타일 (추후 style.css로 합쳐도 됩니다) */
        #town-screen {
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #030307 0%, #0a0a20 100%);
            display: flex;
            flex-direction: column;
        }

        /* 마을 메인 영역 */
        .town-main {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 50px;
            position: relative;
        }

        /* 거점 메뉴 카드 */
        .town-node {
            width: 250px;
            height: 350px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(160, 196, 255, 0.2);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .town-node:hover {
            transform: translateY(-20px);
            background: rgba(160, 196, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(160, 196, 255, 0.3);
        }

        .node-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        .node-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }

        .node-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
            text-align: center;
            padding: 0 20px;
        }

        /* 전투 시작 버튼 (특별 강조) */
        .battle-node {
            border-color: #ff4d4d;
        }
        .battle-node:hover {
            border-color: #ff4d4d;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
        }
    </style>
</head>
<body>
    <div id="town-screen">
        <header class="status-bar">
            <div class="player-info">
                <span class="label">LV.</span>
                <span id="player-level">1</span>
                <span class="label" style="margin-left: 15px;">HP</span>
                <span id="player-hp">100 / 100</span>
            </div>
            <div class="location-info">
                <span id="current-location">안식의 마을, 셀레스티아</span>
            </div>
            <div class="exp-info">
                <span class="label">EXP</span>
                <span id="player-exp">0%</span>
            </div>
        </header>

        <main class="town-main">
            <div class="town-node" onclick="alert('HP가 회복되었습니다!')">
                <div class="node-icon">🌙</div>
                <div class="node-name">달빛 여관</div>
                <div class="node-desc">깊은 잠을 통해 지친 몸을 회복합니다.</div>
            </div>

            <div class="town-node">
                <div class="node-icon">⚒️</div>
                <div class="node-name">성운 대장간</div>
                <div class="node-desc">장비를 가다듬어 더 강해질 수 있습니다.</div>
            </div>

            <div class="town-node battle-node" onclick="location.href='index.html'">
                <div class="node-icon">⚔️</div>
                <div class="node-name">별무리 평원</div>
                <div class="node-desc">마을 밖으로 나가 적들과 맞섭니다.</div>
            </div>
        </main>

        <footer style="padding: 20px; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.8rem;">
            © 2026 Sellestia. All rights reserved by Deuwel.
        </footer>
    </div>

    <script src="js/entities/player.js"></script>
    <script>
        // 마을 진입 시 플레이어 정보를 로컬 스토리지 등에서 불러와서 상단바 갱신하는 로직이 필요합니다.
        document.addEventListener('DOMContentLoaded', () => {
            console.log("마을 거점에 진입했습니다.");
            // 추후 여기에 localStorage에서 데이터를 읽어와 
            // document.getElementById('player-level').innerText 등을 업데이트하는 코드를 넣을 예정입니다.
        });
    </script>
</body>
</html>
